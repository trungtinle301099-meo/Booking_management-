name: Allure Report - Booking Management API Automation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: allure-report-pages
  cancel-in-progress: false

jobs:
  test-and-generate-allure:
    name: Run API Tests and Generate Allure Report
    runs-on: ubuntu-latest

    outputs:
      test_outcome: ${{ steps.run_tests.outcome }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show environment info
        run: |
          node -v
          npm -v
          npx playwright --version

      - name: TypeScript check
        run: npm run type-check

      - name: Lint check
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Clean old reports
        run: npm run allure:clean

      - name: Run Playwright API tests
        id: run_tests
        continue-on-error: true
        env:
          BASE_URL: https://restful-booker.herokuapp.com
          BOOKING_USERNAME: admin
          BOOKING_PASSWORD: password123
        run: npm run test:api

      - name: Generate Allure metadata
        if: always()
        env:
          BASE_URL: https://restful-booker.herokuapp.com
        run: npm run allure:metadata

      - name: Generate Allure HTML report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload Playwright report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Setup GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-allure-report:
    name: Deploy Allure Report to GitHub Pages
    needs: test-and-generate-allure
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy Allure Report
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show Allure Report URL
        run: |
          echo "Allure Report URL: ${{ steps.deployment.outputs.page_url }}"

      - name: Fail workflow if tests failed
        if: needs.test-and-generate-allure.outputs.test_outcome != 'success'
        run: |
          echo "API tests failed. Allure Report was still published for debugging."
          exit 1
