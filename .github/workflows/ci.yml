name: API Automation CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  api-test:
    name: Run API Tests and Generate Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run API tests
        run: npm run test:api
        env:
          BASE_URL: https://restful-booker.herokuapp.com
          BOOKING_USERNAME: ${{ secrets.BOOKING_USERNAME }}
          BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Security audit
        if: always()
        run: npm run security:audit

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Upload Allure report for GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-report/

  deploy-pages:
    name: Deploy Allure Report to GitHub Pages
    needs: api-test
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

